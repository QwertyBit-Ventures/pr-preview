name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Includes the skill-sync guard: fails if SKILL.md, skills/record/SKILL.md,
      # and the RECORD_SKILL template in init.ts ever diverge.
      - run: npm test
